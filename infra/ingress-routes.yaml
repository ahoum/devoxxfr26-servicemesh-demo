# ── HTTPRoute: static assets ─────────────────────────────────────────────────
# /static/* → productpage.bookinfo-nomesh:9080 (no rewrite — path is correct)
# All 4 namespaces serve identical static files; nomesh is the simplest backend.
# This handles absolute asset paths (/static/bootstrap/img/izzy.png, etc.)
# embedded in the HTML returned after prefix-rewriting.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookinfo-static
  namespace: bookinfo-nomesh
spec:
  parentRefs:
  - name: bookinfo-gateway
    namespace: istio-system
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /static/
    backendRefs:
    - name: productpage
      port: 9080
---
# ── HTTPRoute: bookinfo-nomesh ────────────────────────────────────────────────
# /nomesh/* → productpage.bookinfo-nomesh:9080
# Path prefix is stripped: /nomesh/productpage → /productpage
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookinfo-nomesh
  namespace: bookinfo-nomesh
spec:
  parentRefs:
  - name: bookinfo-gateway
    namespace: istio-system
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /nomesh/
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: productpage
      port: 9080
---
# ── HTTPRoute: bookinfo-sidecar ───────────────────────────────────────────────
# /sidecar/* → productpage.bookinfo-sidecar:9080
# Path prefix is stripped: /sidecar/productpage → /productpage
