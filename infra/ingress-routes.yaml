  name: bookinfo-sidecar
  namespace: bookinfo-sidecar
spec:
  parentRefs:
  - name: bookinfo-gateway
    namespace: istio-system
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /sidecar/
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: productpage
      port: 9080
---
