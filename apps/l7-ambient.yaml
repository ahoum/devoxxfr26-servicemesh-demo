# l7-ambient.yaml — Deployments for bookinfo-ambient-l7
#
# The Namespace, GatewayClass, Gateway, ServiceAccounts, and Services for this
# namespace are defined in istio/waypoint.yaml. Apply waypoint.yaml before
# this file.
#
# All pods are unscheduled (no nodeSelector) — the scheduler places them freely
# across available nodes.
#
# ── productpage-v1 ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpage-v1
  namespace: bookinfo-ambient-l7
  labels:
    app: productpage
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productpage
      version: v1
  template:
    metadata:
      labels:
        app: productpage
        version: v1
    spec:
      serviceAccountName: bookinfo-productpage
      containers:
      - name: productpage
        image: docker.io/istio/examples-bookinfo-productpage-v1:1.20.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9080
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
