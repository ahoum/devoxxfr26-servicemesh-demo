# ── GatewayClass (makes Kiali recognise istio-waypoint) ──────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: istio-waypoint
spec:
  controllerName: istio.io/mesh-controller
---
# ── Namespace ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: bookinfo-ambient-l7
  labels:
    istio.io/dataplane-mode: ambient
# ── Waypoint Gateway (reviews service only) ──────────────────────────────
# Traffic destined for the reviews Service is routed through this waypoint
# for L7 policy enforcement (e.g. retries, header manipulation, AuthorizationPolicy).
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: details-waypoint
  namespace: bookinfo-ambient-l7
  labels:
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
  - name: mesh
    port: 15008
    protocol: HBONE
# ── ServiceAccounts ──────────────────────────────────────────────────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-productpage
  namespace: bookinfo-ambient-l7
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-details
  namespace: bookinfo-ambient-l7
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-ratings
  namespace: bookinfo-ambient-l7
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-reviews
  namespace: bookinfo-ambient-l7
# ── Services ─────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: productpage
  namespace: bookinfo-ambient-l7
  labels:
    app: productpage
    service: productpage
spec:
  type: LoadBalancer
  ports:
  - port: 9080
    name: http
  selector:
    app: productpage
---
apiVersion: v1
kind: Service
metadata:
  name: details
  namespace: bookinfo-ambient-l7
  labels:
    app: details
    service: details
    istio.io/use-waypoint: details-waypoint
spec:
  ports:
  - port: 9080
    name: http
  selector:
    app: details
---
apiVersion: v1
kind: Service
metadata:
  name: ratings
  namespace: bookinfo-ambient-l7
  labels:
    app: ratings
    service: ratings
spec:
  ports:
  - port: 9080
    name: http
  selector:
    app: ratings
---
# The reviews Service is annotated with istio.io/use-waypoint so that ztunnel
# routes all traffic destined for reviews through the details-waypoint for L7
# processing. productpage, details, and ratings are NOT routed via the waypoint.
apiVersion: v1
kind: Service
metadata:
  name: reviews
  namespace: bookinfo-ambient-l7
  labels:
    app: reviews
    service: reviews
spec:
  ports:
  - port: 9080
    name: http
  selector:
    app: reviews
